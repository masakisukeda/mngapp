name: mng-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: mng-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Core Files Exist
        run: |
          test -f index.html
          test -f mng.html
          test -f manual.html
          test -f lp/index.html

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.MNG_FTP_HOST }}
          FTP_USER: ${{ secrets.MNG_FTP_USER }}
          FTP_PASS: ${{ secrets.MNG_FTP_PASS }}
          FTP_BASE: ${{ secrets.MNG_FTP_BASE }}
        run: |
          FTP_HOST="${FTP_HOST:-s137.coreserver.jp}"

          if [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ]; then
            echo "MNG_FTP_USER / MNG_FTP_PASS が未設定です" >&2
            exit 1
          fi

          PRIMARY_BASE="/virtual/sukeda/public_html/drsp.cc/mng"
          CANDIDATES=("$PRIMARY_BASE")
          if [ -n "$FTP_BASE" ] && [ "$FTP_BASE" != "$PRIMARY_BASE" ]; then
            CANDIDATES+=("$FTP_BASE")
          fi
          CANDIDATES+=("/public_html/drsp.cc/mng")

          UNIQUE_CANDIDATES=()
          for c in "${CANDIDATES[@]}"; do
            skip=0
            for u in "${UNIQUE_CANDIDATES[@]}"; do
              if [ "$u" = "$c" ]; then
                skip=1
                break
              fi
            done
            if [ "$skip" -eq 0 ]; then
              UNIQUE_CANDIDATES+=("$c")
            fi
          done

          success=0
          for base in "${UNIQUE_CANDIDATES[@]}"; do
            echo "try deploy base: $base"
            if lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" -e "
              set cmd:fail-exit yes;
              set ftp:ssl-allow no;
              mkdir -p $base;
              mkdir -p $base/lp;
              put -O $base .htaccess;
              put -O $base index.html;
              put -O $base mng.html;
              put -O $base manual.html;
              mirror -R --verbose --only-newer \
                --exclude-glob '.DS_Store' \
                ./lp $base/lp;
              bye
            "; then
              success=1
              echo "deploy succeeded: $base"
              break
            fi
          done

          if [ "$success" -ne 1 ]; then
            echo "all deploy candidates failed" >&2
            exit 1
          fi
